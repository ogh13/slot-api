name: SlotAPI CI

on: [push, pull_request]

jobs:
  test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: user
          POSTGRES_PASSWORD: password
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432
      redis:
        image: redis:7
        ports:
          - 6379:6379

    steps:
      - uses: actions/checkout@v4
      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install dependencies
        run: |
          pip install -r requirements.txt
      - name: Create test database
        run: |
          PGPASSWORD=password psql -h localhost -U user -d postgres -c "CREATE DATABASE slotapi_test;"
      - name: Run migrations on test DB
        env:
          DATABASE_URL: postgresql+asyncpg://user:password@localhost:5432/slotapi_test
        run: alembic upgrade head
      - name: Run linter (ruff)
        run: |
          pip install ruff
          ruff check .
      - name: Run tests
        env:
          DATABASE_URL: postgresql+asyncpg://user:password@localhost:5432/slotapi_test
          TEST_DATABASE_URL: postgresql+asyncpg://user:password@localhost:5432/slotapi_test
          REDIS_URL: redis://localhost:6379
          API_KEY: test-key
          API_BASE_URL: http://localhost:8000
        run: pytest -v